name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: bnelair/brainmaze-sphinx/.github/workflows/release.yml@main
    with:
      bump: ${{ inputs.bump }}
      pypi-auth: trusted
    secrets:
      PYPI_Token_General: ${{ secrets.PYPI_Token_General }}
